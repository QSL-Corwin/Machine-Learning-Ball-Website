    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --midnight-blue: #0a0e1a;
            --electric-cyan: #00f5ff;
            --ghost-white: #f8fafc;
            --compliance-red: #ef4444;
        }

        html, body {
            background-color: var(--midnight-blue) !important;
            color: var(--ghost-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }

        .cyan-text { color: var(--electric-cyan); }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .view-section { display: none; opacity: 0; }
        .view-section.active { display: block; animation: fadeUp 0.6s ease-out forwards; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gradient-text {
            background: linear-gradient(to bottom, #ffffff 40%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-hover:hover {
            border-color: var(--electric-cyan);
            background: rgba(0, 245, 255, 0.03);
            transition: all 0.3s ease;
        }

        .compliance-accent {
            background: repeating-linear-gradient(45deg, rgba(239, 68, 68, 0.05), rgba(239, 68, 68, 0.05) 10px, transparent 10px, transparent 20px);
        }

        .social-btn {
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .social-btn:hover {
            border-color: var(--electric-cyan);
            color: var(--electric-cyan);
            background: rgba(0, 245, 255, 0.05);
        }

        .break-word { word-wrap: break-word; overflow-wrap: break-word; }

        /* THE ORB LOGO CSS */
        .orb-glow {
            width: 52px; height: 52px;
            background: var(--electric-cyan);
            border-radius: 50%;
            box-shadow: 0 0 32px var(--electric-cyan), inset 0 0 14px #0a0e1a;
            position: relative;
        }
        .orb-glow::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 64%; height: 64%;
            border: 3px solid #0a0e1a;
            border-radius: 50%;
        }

        /* DATA CARDS */
        .game-card {
            background: #0f1626;
            border: 1px solid rgba(0, 245, 255, 0.25);
            border-radius: 14px;
            padding: 28px 26px;
            height: 100%;
            min-height: 415px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        .node-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--electric-cyan); letter-spacing: 0.12em; text-transform: uppercase; }
        .matchup-web { font-size: 29px; font-weight: 800; line-height: 1.05; margin: 18px 0 7px; }
        .date-web { font-family: 'JetBrains Mono', monospace; color: #94a3b8; font-size: 13px; }
        .metrics-row { display: flex; justify-content: space-between; margin: 26px 0 18px; padding-bottom: 14px; border-bottom: 1px solid rgba(0, 245, 255, 0.18); }
        .metric-block { flex: 1; }
        .metric-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--electric-cyan); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
        .metric-value { font-size: 34px; font-weight: 800; line-height: 1; }
        .insight-container { position: relative; flex: 1; display: flex; flex-direction: column; }
        .volatile-tag { position: absolute; top: 2px; right: 2px; background: var(--compliance-red); color: white; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 3px 11px 4px; border-radius: 4px; letter-spacing: 0.05em; }
        .insight-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--electric-cyan); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 9px; }
        .insight-web { font-size: 15.2px; line-height: 1.48; font-weight: 300; color: #cbd5e1; flex: 1; }

        /* EQUATION CONTAINERS */
        .math-container {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 6px;
            padding: 20px 10px;
            margin-top: 24px;
            overflow-x: auto;
            color: var(--electric-cyan);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .math-container::-webkit-scrollbar { display: none; }
        .math-container { -ms-overflow-style: none; scrollbar-width: none; }

        /* UPLOAD AREA */
        .upload-area { border: 2px dashed #2d3748; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; background: rgba(0,0,0,0.2); display: none; }
        .upload-area.active { display: block; }
        .upload-area:hover { border-color: var(--electric-cyan); background: rgba(0, 245, 255, 0.05); }
    </style>
</head>
<body class="antialiased">

    <!-- NAVIGATION -->
    <nav class="sticky top-0 bg-[#0a0e1a]/95 backdrop-blur-md border-b border-gray-900 z-50 px-4 md:px-6 py-3 md:py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 md:gap-0">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="showView('overview')">
                <div class="orb-glow" style="transform: scale(0.4); transform-origin: left center; width: 40px; height: 40px; margin-right: -15px;"></div>
                <span class="mono text-[10px] md:text-xs uppercase tracking-widest text-white font-bold">Machine Learning Ball <span class="text-cyan-500 ml-1">v3.3.6</span></span>
            </div>
            <div class="flex flex-wrap justify-center gap-4 md:space-x-8 text-[10px] md:text-xs font-bold uppercase tracking-[0.15em] text-gray-500">
                <span id="btn-overview" class="cursor-pointer hover:text-white transition" onclick="showView('overview')">Overview</span>
                <span id="btn-forecasts" class="cursor-pointer hover:text-white transition" onclick="showView('forecasts')">Forecasts</span>
                <span id="btn-daily-results" class="cursor-pointer hover:text-white transition" onclick="showView('daily-results')">Results</span>
                <span id="btn-performance" class="cursor-pointer hover:text-white transition" onclick="showView('performance')">Performance</span>
                <span id="btn-players" class="cursor-pointer hover:text-white transition" onclick="showView('players')">Player Models</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 pb-20 md:pb-32">
        
        <!-- 1. OVERVIEW VIEW -->
        <section id="view-overview" class="view-section active py-12 md:py-24">
            <!-- (unchanged - exact copy from your file) -->
            <div class="max-w-4xl">
                <div class="flex items-center space-x-3 mb-6 md:mb-8">
                    <span class="h-[1px] w-8 md:w-12 bg-cyan-500"></span>
                    <span class="mono text-[8px] md:text-[10px] text-cyan-500 uppercase tracking-[0.3em] md:tracking-[0.4em]">Machine Learning Ball Registry</span>
                </div>
                
                <h1 class="text-4xl sm:text-6xl md:text-8xl font-black uppercase tracking-tighter leading-[0.9] mb-8 md:mb-12 gradient-text break-word">
                    Stochastic <br><span class="cyan-text italic">Throughput.</span>
                </h1>
                
                <p class="text-lg md:text-2xl text-gray-400 font-light leading-relaxed mb-10 md:mb-16 max-w-2xl">
                    Machine Learning Ball models MLB as a high-frequency service system. We quantify win probability and system latency via proprietary queueing theory simulations.
                </p>
                
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-start sm:items-center">
                    <button onclick="showView('forecasts')" class="w-full sm:w-auto bg-white text-black font-extrabold py-4 px-10 rounded-sm uppercase text-[10px] md:text-[11px] tracking-widest hover:bg-cyan-400 transition">
                        Access Forecast Registry
                    </button>
                </div>
            </div>

            <!-- Methodology Grid (unchanged) -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 mt-20 border-t border-gray-900 pt-16">
                <!-- Logic 01, 02, 03 - exact copy from your file -->
                <!-- ... (all three cards unchanged) ... -->
            </div>

            <!-- Compliance (unchanged) -->
            <section class="mt-20 p-8 md:p-12 bg-red-950/10 border border-red-900/30 rounded-sm compliance-accent">
                <!-- exact copy from your file -->
            </section>
        </section>

        <!-- 2. FORECASTS VIEW (unchanged HTML structure) -->
        <section id="view-forecasts" class="view-section py-16 md:py-24">
            <!-- exact copy from your file -->
        </section>

        <!-- 3. DAILY RESULTS VIEW (unchanged HTML structure) -->
        <section id="view-daily-results" class="view-section py-16 md:py-24">
            <!-- exact copy from your file -->
        </section>

        <!-- 4. PERFORMANCE VIEW (unchanged HTML structure - KPIs will update live) -->
        <section id="view-performance" class="view-section py-16 md:py-24">
            <!-- exact copy from your file -->
        </section>

        <!-- 5. PLAYER MODELS (unchanged) -->
        <section id="view-players" class="view-section py-24 md:py-32 text-center">
            <!-- exact copy from your file -->
        </section>

        <!-- FOOTER (unchanged) -->
        <footer class="mt-20 md:mt-32 pt-12 md:pt-16 border-t border-gray-900 flex flex-col md:flex-row justify-between items-start md:items-center gap-10">
            <!-- exact copy from your file -->

    <script>
        // --- NAVIGATION LOGIC ---
        function showView(viewName) {
            document.querySelectorAll('.view-section').forEach(section => section.classList.remove('active'));
            document.querySelectorAll('nav span').forEach(btn => btn.classList.remove('text-cyan-400'));
            
            const activeView = document.getElementById('view-' + viewName);
            if(activeView) activeView.classList.add('active');
            
            const activeBtn = document.getElementById('btn-' + viewName);
            if(activeBtn) activeBtn.classList.add('text-cyan-400');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (viewName === 'performance' && !window.chartsRendered) {
                renderCharts();
                window.chartsRendered = true;
            }
        }

        // FORECASTS - MATCHES YOUR CSV
        async function fetchForecastCSV() {
            const grid = document.getElementById('games-grid');
            try {
                const response = await fetch('data/forecast.csv');
                if (!response.ok) throw new Error("forecast.csv not found");
                const text = await response.text();
                const data = parseForecastCSV(text);
                renderGames(data);
            } catch (error) {
                console.log(error);
            }
        }

        function parseForecastCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                let obj = {};
                headers.forEach((h, i) => obj[h] = values[i]);

                const away = obj.Away || "AWAY";
                const home = obj.Home || "HOME";
                let winProb = parseFloat(obj.WinProb || 0.5) * 100;
                const predicted = obj["Predicted_Score"] || "";
                const parts = predicted.split(' — ');
                const awayScore = parts[0] ? parts[0].replace(/[^0-9.]/g,'') : "0.0";
                const homeScore = parts[1] ? parts[1].replace(/[^0-9.]/g,'') : "0.0";

                let insight = obj.Confidence === "Too-Uncertain" 
                    ? "Model signals low-confidence convergence. Institutional caution advised." 
                    : "Standard queue pressure. Reliability level NORMAL.";

                return { 
                    away, home, 
                    awayScore: parseFloat(awayScore).toFixed(1), 
                    homeScore: parseFloat(homeScore).toFixed(1), 
                    winProb: winProb.toFixed(1), 
                    insight, 
                    date: "MARCH 2026", 
                    volatile: false 
                };
            });
        }

        function renderGames(games) {
            const grid = document.getElementById('games-grid');
            const dateLabel = document.getElementById('forecast-date');
            if (games.length === 0) return;
            dateLabel.innerText = games[0].date;
            grid.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="orb-glow"></div>
                        <div class="node-tag">NODE 3.3.6</div>
                    </div>
                    <div class="matchup-web">${game.away} @ ${game.home}</div>
                    <div class="date-web">${game.date}</div>
                    <div class="metrics-row">
                        <div class="metric-block">
                            <div class="metric-label">Projected Throughput</div>
                            <div class="metric-value">${game.awayScore} – ${game.homeScore}</div>
                        </div>
                        <div class="metric-block text-right">
                            <div class="metric-label">Home Win Probability</div>
                            <div class="metric-value">${game.winProb}%</div>
                        </div>
                    </div>
                    <div class="insight-container mt-4">
                        <div class="insight-label">Service System Insight</div>
                        <div class="insight-web">${game.insight}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // DAILY RESULTS - MATCHES YOUR CSV
        async function fetchResultsCSV() {
            const grid = document.getElementById('results-grid');
            try {
                const response = await fetch('data/results.csv');
                if (!response.ok) throw new Error("results.csv not found");
                const text = await response.text();
                const data = parseResultsCSV(text);
                renderResultGames(data);
            } catch (error) {
                console.log(error);
            }
        }

        function parseResultsCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            
            return lines.slice(1).map(line => {
                const values = line.split(',').map(v => v.trim());
                let obj = {};
                headers.forEach((h, i) => obj[h] = values[i]);

                const away = obj.away_team || "AWAY";
                const home = obj.home_team || "HOME";
                const actAway = obj.away_runs || obj.actual_away || "0";
                const actHome = obj.home_runs || obj.actual_home || "0";

                return {
                    away, home,
                    projAway: "TBD", projHome: "TBD",
                    actAway, actHome,
                    insight: `Model Deviation recorded in Block B`,
                    date: "PREVIOUS SLATE"
                };
            });
        }

        function renderResultGames(games) {
            const grid = document.getElementById('results-grid');
            const dateLabel = document.getElementById('results-date');
            if (games.length === 0) return;
            dateLabel.innerText = games[0].date;
            grid.innerHTML = '';
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="orb-glow"></div>
                        <div class="node-tag">VERIFIED FINAL</div>
                    </div>
                    <div class="matchup-web">${game.away} @ ${game.home}</div>
                    <div class="date-web">${game.date}</div>
                    <div class="metrics-row">
                        <div class="metric-block">
                            <div class="metric-label">Projected</div>
                            <div class="metric-value text-gray-400" style="font-size: 26px;">${game.projAway} – ${game.projHome}</div>
                        </div>
                        <div class="metric-block text-right">
                            <div class="metric-label">Actual Output</div>
                            <div class="metric-value text-white">${game.actAway} – ${game.actHome}</div>
                        </div>
                    </div>
                    <div class="insight-container mt-4">
                        <div class="insight-label">Reconciliation Data</div>
                        <div class="insight-web">${game.insight}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // PERFORMANCE - NOW LIVE FROM CSV
        async function fetchPerformanceCSV() {
            try {
                const response = await fetch('data/performance_metrics.csv');
                if (!response.ok) return;
                const text = await response.text();
                const data = parsePerformanceCSV(text);
                updatePerformanceKPIs(data);
            } catch (e) {}
        }

        function parsePerformanceCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];
            return lines.slice(1).map(line => {
                const cols = line.split(',').map(c => c.trim());
                return { winPct: (parseFloat(cols[1] || 0.584) * 100).toFixed(1) + "%" };
            });
        }

        function updatePerformanceKPIs(data) {
            if (!data.length) return;
            const winEl = document.querySelector('#view-performance .text-3xl.font-black:nth-of-type(2)');
            if (winEl) winEl.textContent = data[data.length-1].winPct;
        }

        // CHARTS (unchanged)
        function renderCharts() {
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = "'JetBrains Mono', monospace";
            
            const ctxWin = document.getElementById('winChart').getContext('2d');
            new Chart(ctxWin, { /* your original chart code unchanged */ 
                type: 'line', data: { labels: ['Week 1','Week 2','Week 3','Week 4','Week 5','Week 6','Week 7'], datasets: [{ label: 'Model Accuracy (%)', data: [52,54,55.5,54.2,57,58.1,58.4], borderColor: '#00f5ff', backgroundColor: 'rgba(0, 245, 255, 0.1)', borderWidth: 2, tension: 0.3, fill: true }] }, options: { responsive: true, scales: { y: { min: 45, max: 65 } }, plugins: { legend: { display: false } } } });
            
            const ctxDev = document.getElementById('devChart').getContext('2d');
            new Chart(ctxDev, { /* your original bar chart unchanged */ 
                type: 'bar', data: { labels: ['0-1 Runs','1-2 Runs','2-3 Runs','3-4 Runs','4+ Runs'], datasets: [{ label: 'Frequency', data: [42,25,12,5,2], backgroundColor: '#ef4444' }] }, options: { responsive: true, plugins: { legend: { display: false } } } });
        }

        // Init
        window.onload = () => {
            showView('overview');
            fetchForecastCSV();
            fetchResultsCSV();
            fetchPerformanceCSV();

            if (typeof renderMathInElement === 'function') {
                renderMathInElement(document.body, {
                    delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}]
                });
            }
        };
    </script>
</body>
